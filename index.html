<style>
:root{
--pink:#d81e5b;
--dark:#120307;
--green:#22c55e;
--light:#f8f9fa;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Montserrat,sans-serif}

body{background:#000}

.wrapper{
max-width:500px;
margin:auto;
background:#fff;
min-height:100vh;
}

.top-bar{
background:var(--pink);
color:#fff;
text-align:center;
padding:10px;
font-size:11px;
font-weight:700;
}

.header{
padding:25px 15px;
text-align:center;
}

.header h1{
font-size:24px;
font-weight:900;
line-height:1.2;
color:var(--dark);
}

.header span{color:var(--pink)}

.vsl-container{background:#000;padding:10px}

.video-wrapper{
position:relative;
padding-bottom:56.25%;
height:0;
border-radius:8px;
overflow:hidden;
}

.video-wrapper iframe{
position:absolute;
top:0;left:0;
width:100%;
height:100%;
border:0;
}

#delayed-content{display:none}

.cta-green{
display:block;
margin:25px 20px;
background:linear-gradient(180deg,#2ecc71,#27ae60);
color:#fff;
text-align:center;
padding:18px;
border-radius:12px;
font-weight:900;
font-size:18px;
text-decoration:none;
}

.secure-notice{
text-align:center;
font-size:11px;
color:#777;
margin-top:-15px;
}

.product-box{
background:var(--light);
padding:35px 20px;
text-align:center;
}

.product-img{
max-width:230px;
width:100%;
margin-bottom:15px;
}

.benefits-list{text-align:left;margin-top:15px}

.benefit-item{
display:flex;
align-items:center;
margin-bottom:10px;
font-size:15px;
font-weight:600;
}

.benefit-item::before{
content:'✓';
background:var(--pink);
color:#fff;
width:20px;
height:20px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-right:10px;
font-size:12px;
}

.testimonials{
padding:30px 15px;
}

.stories-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
gap:10px;
}

.story-box{
aspect-ratio:9/16;
background:#eee;
border-radius:10px;
border:2px solid var(--pink);
}

.footer{
background:#111;
color:#777;
padding:25px;
font-size:10px;
text-align:center;
}
